<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />

<title>Break & Bread - Menu</title>

<!-- خط Tajawal -->
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
:root {
  --primary: #f27e3e;
  --bg: #fff7f2;
  --card-bg: #ffffff;
  --text-main: #2b241a;
  --text-muted: #7a6a55;
}

body {
  margin: 0;
  font-family: 'Tajawal', sans-serif;
  background: var(--bg);
  color: var(--text-main);
}

/* ===========================
   HERO HEADER
=========================== */
.hero-header {
  width: 100%;
  height: 260px;
  position: relative;
  overflow: hidden;
  display: flex;
  align-items: flex-end;
  justify-content: flex-start;
}

.hero-header img.hero-bg {
  width: 100%;
  height: 100%;
  object-fit: cover; /* الصورة تظهر ممتدة بالكامل */
  position: absolute;
  top: 0;
  right: 0;
}

.hero-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(to top, rgba(0,0,0,0.7), rgba(0,0,0,0.15));
}

.hero-content {
  position: relative;
  z-index: 2;
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 16px;
}

.hero-logo {
  width: 70px;
  height: 70px;
  border-radius: 18px;
  overflow: hidden;
  background: #fff;
}

.hero-logo img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.hero-text h1 {
  margin: 0;
  color: #fff;
  font-size: 22px;
}

.hero-text small {
  color: #fff;
  opacity: 0.9;
}

/* ===========================
   FILTER BAR (STICKY)
=========================== */
.filters-bar {
  position: sticky;
  top: 0;
  z-index: 999;
  background: #fff;
  padding: 10px;
  border-bottom: 1px solid rgba(0,0,0,0.08);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.filters-scroll {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  white-space: nowrap;
  scrollbar-width: none;
}

.filters-scroll::-webkit-scrollbar {
  display: none;
}

.filter-btn {
  padding: 6px 14px;
  border-radius: 999px;
  border: 1px solid transparent;
  background: #fff3ec;
  cursor: pointer;
  font-size: 13px;
  transition: 0.25s ease;
}

.filter-btn.active {
  background: var(--primary);
  color: #fff;
  box-shadow: 0 4px 10px rgba(242,126,62,0.4);
}

/* زر القائمة */
.filters-menu-btn {
  background: var(--primary);
  color: #fff;
  border: none;
  padding: 6px 12px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 20px;
}

/* ===========================
   FULLSCREEN FILTER MENU
=========================== */
.filters-fullscreen {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.55);
  display: none;
  justify-content: center;
  align-items: flex-start;
  padding-top: 40px;
  z-index: 9999;
}

.filters-fullscreen-content {
  background: #fff;
  width: 92%;
  max-width: 420px;
  max-height: 85vh;
  padding: 20px;
  border-radius: 16px;
  position: relative;
  overflow: hidden;
}

.close-full {
  position: absolute;
  top: 10px;
  left: 10px;
  background: var(--primary);
  color: #fff;
  border: none;
  font-size: 20px;
  width: 34px;
  height: 34px;
  border-radius: 50%;
  cursor: pointer;
}

.filters-full-list {
  margin-top: 50px;
  overflow-y: auto;
  max-height: calc(85vh - 80px);
}

.filter-full-btn {
  display: block;
  width: 100%;
  padding: 14px;
  margin: 6px 0;
  border-radius: 10px;
  border: 1px solid #ddd;
  background: #fff3ec;
  font-size: 16px;
  cursor: pointer;
}

/* ===========================
   MENU CONTENT
=========================== */
.menu-content {
  padding: 16px;
}

.category-title {
  font-size: 20px;
  margin: 20px 0 10px;
}

/* ===========================
   FULL WIDTH ITEM CARD
=========================== */
.item-card {
  background: var(--card-bg);
  padding: 14px;
  border-radius: 16px;
  border: 1px solid rgba(0,0,0,0.05);
  margin-bottom: 12px;
  cursor: pointer;
  transition: 0.2s ease;
  box-shadow: 0 6px 14px rgba(0,0,0,0.04);
}

.item-card:hover {
  transform: translateY(-2px);
}

.item-header {
  display: flex;
  justify-content: space-between;
}

.item-name {
  font-size: 16px;
  font-weight: 600;
}

.item-desc {
  font-size: 13px;
  color: var(--text-muted);
}

.item-price-wrap {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
}

.item-price {
  font-size: 18px;
  font-weight: 700;
  color: var(--primary);
}

.sar-icon {
  width: 20px;
  height: 20px;
  margin-top: 2px;
}

/* ===========================
   COLLAPSE
=========================== */
.item-collapse {
  overflow: hidden;
  max-height: 0;
  opacity: 0;
  transition: max-height .35s ease, opacity .35s ease;
}

.item-card.open .item-collapse {
  max-height: 260px;
  opacity: 1;
}

.item-collapse-inner img {
  width: 100%;
  border-radius: 12px;
  margin-top: 10px;
}

/* ===========================
   HIDE TITLES WHEN FILTERED
=========================== */
.hidden {
  display: none !important;
}
</style>
</head>

<body>

<!-- ===========================
     HERO HEADER
=========================== -->
<div class="hero-header">
  <img src="header-bg.png" class="hero-bg" alt="">
  <div class="hero-overlay"></div>

  <div class="hero-content">
    <div class="hero-logo">
      <img src="logo.png" alt="">
    </div>
    <div class="hero-text">
      <h1>Break & Bread</h1>
      <small>قائمة الطعام</small>
    </div>
  </div>
</div>

<!-- ===========================
     FILTER BAR
=========================== -->
<div class="filters-bar">
  <div class="filters-scroll">
    <button class="filter-btn active" data-filter="all">الكل</button>
    <button class="filter-btn" data-filter="offers">عروض</button>
    <button class="filter-btn" data-filter="meals">وجبات</button>
    <button class="filter-btn" data-filter="sandwiches">ساندوتشات</button>
    <button class="filter-btn" data-filter="addons">إضافات</button>
    <button class="filter-btn" data-filter="plates">أطباق</button>
    <button class="filter-btn" data-filter="pasta">باستا</button>
    <button class="filter-btn" data-filter="pasta-addons">إضافات الباستا</button>
    <button class="filter-btn" data-filter="breakfast-boxes">بوكسات فطور</button>
    <button class="filter-btn" data-filter="bakery">معجنات</button>
    <button class="filter-btn" data-filter="falafel">فلافل</button>
    <button class="filter-btn" data-filter="drinks">مشروبات</button>
  </div>

  <button class="filters-menu-btn">☰</button>
</div>

<!-- ===========================
     FULLSCREEN FILTER MENU
=========================== -->
<div class="filters-fullscreen" id="filtersFull">
  <div class="filters-fullscreen-content">
    <button class="close-full">✕</button>

    <h3>كل الفئات</h3>

    <div class="filters-full-list">
      <button class="filter-full-btn" data-filter="all">الكل</button>
      <button class="filter-full-btn" data-filter="offers">عروض</button>
      <button class="filter-full-btn" data-filter="meals">وجبات</button>
      <button class="filter-full-btn" data-filter="sandwiches">ساندوتشات</button>
      <button class="filter-full-btn" data-filter="addons">إضافات</button>
      <button class="filter-full-btn" data-filter="plates">أطباق</button>
      <button class="filter-full-btn" data-filter="pasta">باستا</button>
      <button class="filter-full-btn" data-filter="pasta-addons">إضافات الباستا</button>
      <button class="filter-full-btn" data-filter="breakfast-boxes">بوكسات فطور</button>
      <button class="filter-full-btn" data-filter="bakery">معجنات</button>
      <button class="filter-full-btn" data-filter="falafel">فلافل</button>
      <button class="filter-full-btn" data-filter="drinks">مشروبات</button>
    </div>
  </div>
</div>

<!-- ===========================
     MENU CONTENT
=========================== -->
<div class="menu-content">

  <!-- مثال قسم واحد — كرر نفس النمط لباقي الأقسام -->
  <h2 class="category-title" data-section="offers">عروض</h2>

  <div class="item-card" data-category="offers">
    <div class="item-header">
      <div>
        <div class="item-name">عرض فطور لشخصين</div>
        <div class="item-desc">بيض، جبن، خبز طازج، مشروبان ساخنان.</div>
      </div>
      <div class="item-price-wrap">
        <div class="item-price">39</div>
        <img src="sar.png" class="sar-icon">
      </div>
    </div>

    <div class="item-collapse">
      <div class="item-collapse-inner">
        <img src="product-offer1.jpg">
      </div>
    </div>
  </div>

</div>

<!-- ===========================
     JAVASCRIPT
=========================== -->
<script>
const filterBtns = document.querySelectorAll(".filter-btn");
const filterFullBtns = document.querySelectorAll(".filter-full-btn");
const cards = document.querySelectorAll(".item-card");
const titles = document.querySelectorAll(".category-title");
const fullMenu = document.getElementById("filtersFull");
const openMenuBtn = document.querySelector(".filters-menu-btn");
const closeMenuBtn = document.querySelector(".close-full");

/* فتح القائمة */
openMenuBtn.onclick = () => {
  fullMenu.style.display = "flex";
};

/* إغلاق القائمة */
closeMenuBtn.onclick = () => {
  fullMenu.style.display = "none";
};

/* تطبيق الفلتر */
function applyFilter(filter) {
  filterBtns.forEach(b => b.classList.remove("active"));
  const topBtn = document.querySelector(`.filter-btn[data-filter="${filter}"]`);
  if (topBtn) topBtn.classList.add("active");

  cards.forEach(card => {
    card.style.display = (filter === "all" || card.dataset.category === filter) ? "block" : "none";
    card.classList.remove("open");
  });

  if (filter === "all") {
    titles.forEach(t => t.classList.remove("hidden"));
  } else {
    titles.forEach(t => t.classList.add("hidden"));
  }

  fullMenu.style.display = "none";
}

filterBtns.forEach(btn => {
  btn.addEventListener("click", () => applyFilter(btn.dataset.filter));
});

filterFullBtns.forEach(btn => {
  btn.addEventListener("click", () => applyFilter(btn.dataset.filter));
});

/* Collapse */
cards.forEach(card => {
  card.addEventListener("click", () => {
    card.classList.toggle("open");
  });
});
</script>

</body>
</html>
